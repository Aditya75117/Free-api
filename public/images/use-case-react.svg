<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none" role="img" aria-label="React component fetching data from a mock REST API endpoint">
  <rect width="640" height="400" rx="16" fill="#0a0a0a"/>
  <circle cx="200" cy="200" r="60" fill="#61dafb" opacity="0.2"/>
  <text x="175" y="208" fill="#61dafb" font-family="sans-serif" font-size="28" font-weight="700">React</text>
  <path d="M280 200 L360 200" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/></marker></defs>
  <rect x="380" y="140" width="200" height="120" rx="10" fill="#141414" stroke="#7c3aed"/>
  <text x="400" y="175" fill="#a78bfa" font-family="monospace" font-size="11">fetch('/users')</text>
  <text x="400" y="200" fill="#86efac" font-family="monospace" font-size="11">’ JSON data</text>
  <text x="400" y="230" fill="#999" font-family="sans-serif" font-size="11">Mock REST API</text>
</svg>
